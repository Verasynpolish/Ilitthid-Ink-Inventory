<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Illithid Ink — Inventory</title>
<style>
    :root{--bg:#0b0c10;--panel:#111318;--muted:#8a91a5;--text:#e8ecf1;--chip:#1a1e27;--border:#1f2430}
    html,body{height:100%} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif;background:#0b0c10;color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:#111318;border-bottom:1px solid var(--border)}
    .container{max-width:1280px;margin:0 auto;padding:16px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .brand{font-weight:700}
    .search{flex:1;min-width:240px}
    .search input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:#0f1218;color:var(--text);outline:none}
    .control{display:flex;gap:8px;align-items:center;background:#111318;padding:8px 10px;border-radius:12px;border:1px solid var(--border)}
    .control label{font-size:12px;color:var(--muted)}
    select{background:#0f1218;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:8px;min-width:160px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;margin:12px 0;gap:12px;flex-wrap:wrap}
    .count{font-size:12px;color:var(--muted)}
    .kpis{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin:6px 0 12px}
    .kpis span{background:#0f1218;border:1px solid var(--border);border-radius:8px;padding:6px 8px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding-bottom:24px}
    .card{background:#111318;border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .card.discontinued{opacity:.5}
    .imgwrap{aspect-ratio:4/3;background:#0d1117;display:flex;align-items:center;justify-content:center;color:#5b6a77}
    .imgwrap img{max-width:100%;max-height:100%;object-fit:contain}
    .card-body{padding:12px}
    .name{font-weight:700;font-size:15px;line-height:1.25;margin:0 0 6px}
    .meta{font-size:12px;color:var(--muted)}
    .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .chip{font-size:11px;padding:4px 8px;background:var(--chip);border:1px solid var(--border);border-radius:999px;color:#cfe7ff}
    .chip.discontinued{background:#3a1212;border-color:#aa3333;color:#ff9999}
    .chip.unverified{background:#3a2b12;border-color:#c2953a;color:#ffe7b3}
    .chip.stain-high{background:#3a1212;border-color:#cc4444;color:#ffb3b3}
    .chip.stain-medium{background:#3a2d12;border-color:#cc8844;color:#ffd1a3}
    .chip.stain-low{background:#12331f;border-color:#3a7a4a;color:#b9ffd1}

    .chip.la-safe{background:#193b1e;border-color:#2c7743;color:#9dffb3}
    .chip.la-unsafe{background:#3a1212;border-color:#aa3333;color:#ff9999}
    
    .price{margin-top:8px;font-size:13px}
    .btn{cursor:pointer;display:inline-flex;gap:8px;align-items:center;background:#111826;border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:10px}
    .btn:hover{border-color:#2b3444}
    #toTop {
  display: none;              /* Hidden by default */
  position: fixed;            /* Fixed position */
  bottom: px;
  right: px;
  z-index: 99;                /* Make sure it stays on top */
  font-size: 14px;
  border: 1px solid var(--border);
  outline: none;
  background-color: #111826;
  color: var(--text);
  cursor: pointer;
  padding: 10px 14px;
  border-radius: 10px;
}
#toTop:hover {
  border-color: #2b3444;
}
  
    /* --- Cosmetic safety flags + vendor grouping --- */
    .imgwrap{position:relative;overflow:hidden}
    .flag{position:absolute;top:10px;right:10px;padding:6px 10px;border-radius:999px;font-size:12px;line-height:1;border:1px solid var(--border);background:rgba(255,255,255,.06);backdrop-filter: blur(6px)}
    .flag.cos-safe{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.14);color:#c8f7d6}
    .flag.cos-unsafe{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.14);color:#ffd2d2}
    .chip.cos-safe{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.12);color:#c8f7d6}
    .chip.cos-unsafe{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.12);color:#ffd2d2}
    .group-header{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin:14px 0 2px;padding:10px 12px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.03)}
    .group-header .vendor{font-weight:700;letter-spacing:.2px}
    .group-header .count{color:var(--muted);font-size:13px}


    .docs{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .docchip{font-size:11px;padding:4px 8px;background:var(--chip);border:1px solid var(--border);border-radius:999px;color:#cfe7ff;text-decoration:none;display:inline-block}
    .docchip:hover{border-color:var(--accent)}
    .docchip.disabled{opacity:.45;pointer-events:none}

  </style>
</head>

<header>
<div class="container row">
<div class="brand">Illithid Ink · Pigments · Glitters · Powders</div>
<div class="search"><input id="q" placeholder="Search name, vendor, notes, order ID…" type="search"/></div>
<div class="control">
<label for="vendor">Vendor</label>
<select id="vendor"><option value="">All vendors</option></select>
</div>
<div class="control">
<label for="category">Category</label>
<select id="category"><option value="">All categories</option></select>
</div>
<div class="control">
<label for="finish">Finish</label>
<select id="finish"><option value="">All finishes</option></select>
</div>
<div class="control">
<label for="color">Color</label>
<select id="color"><option value="">All colors</option></select>
</div>
<div class="control">
<label for="la_safe">LA Safety</label>
<select id="la_safe">
<option value="">All safety statuses</option>
<option value="safe">LA Safe only</option>
<option value="unsafe">Not LA Safe</option>
</select>
</div>
<div class="control">
<label for="sort">Sort</label>
<select id="sort">
<option value="vendor_name">Vendor (grouped) → Name (A→Z)</option>
<option value="name">Name (A→Z)</option>
<option value="cpgram_asc">Cost/gram (low→high)</option>
<option value="cpgram_desc">Cost/gram (high→low)</option>
<option value="date_desc">Newest first</option>
<option value="date_asc">Oldest first</option>
</select>
</div>
<button class="btn" id="clear">Clear filters</button>
</div>
</header>
<main class="container">
<div class="toolbar"><div class="count" id="count">0 items</div></div>
<div class="kpis">
<span id="kpi_total_items">Total items: 0</span>
<span id="kpi_total_cost">Total spend: $0.00</span>
<span id="kpi_total_weight">Total weight: 0 g</span>
<span id="kpi_avg_cpg">Avg $/g: $0.00</span>
</div>
<div aria-live="polite" class="grid" id="grid"></div>
</main>

// normalize: auto-apply HALF_OZ_G if weight missing and name/notes mention 1/2 oz
for (var i=0;i<window.__INV__.length;i++){
  var it = window.__INV__[i];
  var notes = (it.notes||'').toLowerCase();
  var name = (it.name||'').toLowerCase();
  if ((it.weight_g==null || it.weight_g===0) && (notes.includes('1/2 oz') || name.includes('1/2 oz') || name.includes('1/2 ounce'))) {
    it.weight_g = HALF_OZ_G;
  }
}

// cleanup: trim strings and normalize empty values
function cleanStr(x){
  if(x===null||typeof x==="undefined") return x;
  var s=String(x).replace(/\s+/g," ").trim();
  return s===""?null:s;
}
for (var j=0;j<window.__INV__.length;j++){
  var x = window.__INV__[j];
  if(!x) continue;
  x.id = cleanStr(x.id);
  x.name = cleanStr(x.name);
  x.vendor = cleanStr(x.vendor);
  x.category = cleanStr(x.category);
  x.finish = cleanStr(x.finish);
  x.color = cleanStr(x.color);
  x.particle_size_microns = cleanStr(x.particle_size_microns);
  x.order_id = cleanStr(x.order_id);
  x.order_date = cleanStr(x.order_date);
  x.location = cleanStr(x.location);
  x.notes = cleanStr(x.notes);
  x.image_url = cleanStr(x.image_url);
  x.verification_status = cleanStr(x.verification_status);
  x.staining_risk = cleanStr(x.staining_risk);
}
function $(s){return document.querySelector(s)}
function fmtUSD(n){return isFinite(n)?"$"+n.toFixed(2):"—"}
function num(v){return(v===null||v===""||typeof v==="undefined")?null:Number(v)}
function cpg(it){var p=num(it.price_usd),g=num(it.weight_g);return(p!==null&&g)?p/g:null}
function cpml(it){var p=num(it.price_usd), v=num(it.volume_ml);return (p!==null && v) ? p/v : null;}
var DB = Array.isArray(window.__INV__)?window.__INV__:[];

// Rule: only VERIFIED items can be marked LA Safe
DB.forEach(function(item){
  if(item && item.verification_status !== "verified") item.la_safe = false;
});

function uniq(a){var m={},o=[];for(var i=0;i<a.length;i++){var k=String(a[i]||"");if(k&&!m[k]){m[k]=1;o.push(k)}}o.sort(function(a,b){return String(a).localeCompare(String(b))});return o}
function populate(){
  var v = uniq(DB.map(function(x){return x.vendor}).filter(Boolean));
  var c = uniq(DB.map(function(x){return x.category}).filter(Boolean));
  var f = uniq(DB.map(function(x){return x.finish}).filter(Boolean));
  var clr = uniq(DB.map(function(x){return x.color}).filter(Boolean));
  $("#vendor").innerHTML   = '<option value="">All vendors</option>'   + v.map(function(x){return '<option>'+x+'</option>'}).join('');
  $("#category").innerHTML = '<option value="">All categories</option>' + c.map(function(x){return '<option>'+x+'</option>'}).join('');
  $("#finish").innerHTML   = '<option value="">All finishes</option>'  + f.map(function(x){return '<option>'+x+'</option>'}).join('');
  $("#color").innerHTML    = '<option value="">All colors</option>'    + clr.map(function(x){return '<option>'+x+'</option>'}).join('');
}
var state={q:"",vendor:"",category:"",finish:"",color:"",la_safe:"",sort:"vendor_name"};
function filterDB(){
  var q=(state.q||"").toLowerCase();
  var rows = DB.filter(function(it){
    var hay=[it.name,it.vendor,it.category,it.finish,it.color,it.particle_size_microns,it.order_id,it.notes].join(" ").toLowerCase();
    var matchQ = !q || hay.indexOf(q)!==-1;
    var mv = !state.vendor || it.vendor===state.vendor;
    var mc = !state.category || it.category===state.category;
    var mf = !state.finish || it.finish===state.finish;
    var mclr = !state.color || (it.color && it.color.toLowerCase().indexOf(state.color.toLowerCase())!==-1);
    var msafe = !state.la_safe ||
      (state.la_safe==='safe' && it.la_safe===true) ||
      (state.la_safe==='unsafe' && it.la_safe===false);
    return matchQ && mv && mc && mf && mclr && msafe;
  });
  rows.sort(function(a,b){
    function cmp(x,y){return String(x||"").localeCompare(String(y||""), undefined, {sensitivity:"base"});}
    if(state.sort==='vendor_name'){
      var v = cmp(a.vendor,b.vendor); if(v) return v;
      return cmp(a.name,b.name);
    }
    if(state.sort==='name')        return cmp(a.name,b.name);
    if(state.sort==='cpgram_asc')  return (cpg(a)||Infinity)-(cpg(b)||Infinity);
    if(state.sort==='cpgram_desc') return (cpg(b)||-Infinity)-(cpg(a)||-Infinity);
    if(state.sort==='date_desc')   return String(b.order_date||"").localeCompare(String(a.order_date||"")); 
    if(state.sort==='date_asc')    return String(a.order_date||"").localeCompare(String(b.order_date||"")); 
    return 0;
  });
  return rows;
}
function totals(rows){
  var spend=0, wt=0, sum=0, cnt=0;
  for(var i=0;i<rows.length;i++){
    spend += num(rows[i].price_usd)||0;
    wt += num(rows[i].weight_g)||0;
    var x=cpg(rows[i]); if(x!==null){sum+=x;cnt++;}
  }
  return {spend:spend,wt:wt,avg:cnt?sum/cnt:0};
}
function render(){
  var data=filterDB();
  $("#count").textContent=data.length+" item"+(data.length!==1?'s':'');
  var t=totals(data);
  $("#kpi_total_items").textContent="Total items: "+data.length;
  $("#kpi_total_cost").textContent="Total spend: "+fmtUSD(t.spend);
  $("#kpi_total_weight").textContent="Total weight: "+t.wt.toFixed(2)+" g";
  $("#kpi_avg_cpg").textContent="Avg $/g: "+(isFinite(t.avg)?"$"+t.avg.toFixed(2):"—");
  var grid=$("#grid"); 
  grid.innerHTML="";
  if(!data.length){
    var d=document.createElement('div');
    d.className='meta';
    d.textContent='No items match your filters.';
    grid.appendChild(d);
    return;
  }
  var currentVendor=null;
  for(var i=0;i<data.length;i++){
    var it=data[i];
    // Insert vendor header rows when using grouped vendor sort
    if(state.sort==='vendor_name'){
      var vName = it.vendor || 'Unknown vendor';
      if(vName !== currentVendor){
        currentVendor = vName;
        // count items in this vendor (contiguous because of sort)
        var cnt=0;
        for(var k=i;k<data.length;k++){ if((data[k].vendor||'Unknown vendor')===vName) cnt++; else break; }
        var gh=document.createElement('div');
        gh.className='group-header';
        gh.innerHTML = '<span class="vendor">'+vName+'</span><span class="count">(' + cnt + ')</span>';
        grid.appendChild(gh);
      }
    }
    var card=document.createElement('article'); 
    card.className='card';
    if(it.discontinued===true){ card.classList.add('discontinued'); }
    var imgwrap=document.createElement('div'); 
    imgwrap.className='imgwrap';
    if(it.image_url){
      var img=document.createElement('img'); 
      img.src=it.image_url; 
      img.alt=it.name||''; 
      imgwrap.appendChild(img);
    } else {
      imgwrap.textContent='no image';
    }
    // cosmetic safety flag (top-right)
    if(it.cosmetic_safe===true || it.cosmetic_safe===false){
      var flag=document.createElement('div');
      flag.className='flag ' + (it.cosmetic_safe? 'cos-safe':'cos-unsafe');
      flag.textContent = it.cosmetic_safe? 'Cosmetic Safe':'Not Cosmetic Safe';
      imgwrap.appendChild(flag);
    }
    var body=document.createElement('div'); 
    body.className='card-body';
    var name=document.createElement('h3'); 
    name.className='name'; 
    name.textContent=it.name||'(Unnamed)';
    var meta=document.createElement('div'); 
    meta.className='meta';
    var vendorText = it.vendor || 'Unknown';
    var categoryText = it.category || '';
    var finishText = it.finish ? (' • '+it.finish) : '';
    meta.textContent = vendorText + ' • ' + categoryText + finishText;
    var chips=document.createElement('div'); 
    chips.className='chips';
    function chip(txt,cls){
      var s=document.createElement('span'); 
      s.className='chip'+(cls?(' '+cls):''); 
      s.textContent=txt; 
      chips.appendChild(s);
    }
    if(it.color) chip(it.color);
    if(it.particle_size_microns) chip(String(it.particle_size_microns)+'µm');
    if(it.solvent_safe===true) chip('Solvent-safe');
    if(it.discontinued===true) chip('Discontinued','discontinued');
    if(it.la_safe===true) chip('LA Safe','la-safe');
    else if(it.la_safe===false) chip('Not LA Safe','la-unsafe');
    if(it.cosmetic_safe===true) chip('Cosmetic Safe','cos-safe');
    else if(it.cosmetic_safe===false) chip('Not Cosmetic Safe','cos-unsafe');
    if(it.verification_status==='unverified') chip('Unverified','unverified');
    if(it.staining_risk==='high') chip('High stain','stain-high');
    else if(it.staining_risk==='medium') chip('Med stain','stain-medium');
    else if(it.staining_risk==='low') chip('Low stain','stain-low');
    var price=document.createElement('div'); 
    price.className='price';
    var c=cpg(it), parts=[];
    if(it.weight_g) parts.push(String(it.weight_g)+' g');
    if(it.volume_ml) parts.push(String(it.volume_ml)+' ml');
    parts.push(it.price_usd!=null?fmtUSD(Number(it.price_usd)):'—');
    parts.push(c!=null?("$"+c.toFixed(2)+"/g"):"$/g N/A");
    var m=cpml(it);
    if(it.volume_ml) parts.push(m!=null?("$"+m.toFixed(2)+"/ml"):"$/ml N/A");
    price.innerHTML=parts.join(' · ');
    if (it.moq_g) {
      var moqLine = document.createElement('div');
      moqLine.className = 'meta';
      moqLine.textContent = "MOQ: " + it.moq_g + " g";
      body.appendChild(moqLine);
    }
    body.appendChild(name); 
    body.appendChild(meta); 
    body.appendChild(chips);

    // SDS/MSDS + COA doc chips (always visible; disabled if missing)
    var docs=document.createElement('div');
    docs.className='docs';
    function docChip(label,url){
      if(url){
        var a=document.createElement('a');
        a.className='docchip';
        a.href=url;
        a.target='_blank';
        a.rel='noopener';
        a.textContent=label;
        return a;
      }
      var s=document.createElement('span');
      s.className='docchip disabled';
      s.textContent=label;
      return s;
    }
    var sdsUrl = it.msds_url || it.sds_url || '';
    var coaUrl = it.coa_url || '';
    docs.appendChild(docChip('SDS/MSDS', sdsUrl));
    docs.appendChild(docChip('COA', coaUrl));
    body.appendChild(docs);
 
    body.appendChild(price);
    card.appendChild(imgwrap); 
    card.appendChild(body); 
    grid.appendChild(card);
  }
}
function clearFilters(){
  state={q:"",vendor:"",category:"",finish:"",color:"",la_safe:"",sort:"vendor_name"};
  $("#q").value=""; 
  $("#vendor").value=""; 
  $("#category").value=""; 
  $("#finish").value=""; 
  $("#color").value=""; 
  $("#la_safe").value=""; 
  $("#sort").value="vendor_name";
  render();
}
function init(){
  populate();
  $("#sort").value = state.sort;
  $("#q").addEventListener('input', function(e){state.q=e.target.value; render();});
  $("#vendor").addEventListener('change', function(e){state.vendor=e.target.value; render();});
  $("#category").addEventListener('change', function(e){state.category=e.target.value; render();});
  $("#finish").addEventListener('change', function(e){state.finish=e.target.value; render();});
  $("#color").addEventListener('change', function(e){state.color=e.target.value; render();});
  $("#la_safe").addEventListener('change', function(e){state.la_safe=e.target.value; render();});
  $("#sort").addEventListener('change', function(e){state.sort=e.target.value; render();});
  $("#clear").addEventListener('click', clearFilters);
  render();
}
init();

document.addEventListener("DOMContentLoaded", function() {
  const btn = document.getElementById("toTop");
  if (!btn) return;

  window.addEventListener("scroll", function() {
    if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
      btn.style.display = "block";
    } else {
      btn.style.display = "none";
    }
  });

  btn.addEventListener("click", function() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
});
